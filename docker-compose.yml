version: "3.8"

services:
  mysql-docker:
    image: mysql:8.4.5
    environment:
      MYSQL_ROOT_PASSWORD: 12345678
      MYSQL_DATABASE: personal_loan_database
    ports:
      - "4000:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      mysql-docker:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: jdbc:mysql://mysql-docker:3306/personal_loan_database
      DATABASE_USER: root
      DATABASE_PASSWORD: 12345678

  frontend:
    build:
      context: ./frontend2/vite-project/
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend